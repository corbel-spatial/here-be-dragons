[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "win-64", "osx-64", "osx-arm64"]

[dependencies]
pixi-pycharm = ">=0.0.11,<0.0.12"
ruff = ">=0.15.11,<0.16"

[feature.build.dependencies]
pygithub = ">=2.9.1,<3"
semver = ">=3.0.4,<4"
tomlkit = ">=0.14.0,<0.15"

[feature.build.tasks]
build = { depends-on = ["build-base", "build-latest", "build-next"] }
build-base = "docker compose --env-file versions.env --project-directory docker build base"
build-latest = { cmd = "docker compose --env-file versions.env --project-directory docker build latest" }
build-next = { cmd = "docker compose --env-file versions.env --project-directory docker build next" }
build-ci = "python ./scripts/ci.py"
lint = "ruff check scripts/ --fix"
update = "python scripts/update.py"

[feature.docs]
# dependencies should include everything in docs/requirements.txt
dependencies = { "jupyter" = ">=1.1.1,<2", "myst-parser" = ">=5.0.0,<6", "nbsphinx" = ">=0.9.8,<0.10", "notebook" = ">=7.5.5,<8", "pydata-sphinx-theme"= ">=0.17.0,<0.18", "sphinx" = ">=9.1.0,<10", "sphinx-copybutton" = ">=0.5.2,<0.6"}
platforms = ["linux-64"]
tasks = {"docs" = "make -C docs html"}

[environments]
default = ["default", "build"]
build = { features = ["build"], solve-group = "build" }
docs = { features = ["docs"], solve-group = "docs" }
