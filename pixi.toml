[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
pixi-pycharm = ">=0.0.11,<0.0.12"

[feature.docs]
# dependencies should include everything in docs/requirements.txt
dependencies = { "jupyter" = ">=1.1.1,<2", "myst-parser" = ">=5.0.0,<6", "nbsphinx" = ">=0.9.8,<0.10", "notebook" = ">=7.5.6,<8", "pydata-sphinx-theme"= ">=0.17.1,<0.18", "sphinx" = ">=9.1.0,<10", "sphinx-copybutton" = ">=0.5.2,<0.6"}
platforms = ["linux-64"]
tasks = {"docs" = "make -C docs html"}

[environments]
default = ["default"]
docs = { features = ["docs"], solve-group = "docs" }
