[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
python = ">=3.14.5,<3.15"
python-dotenv = ">=1.2.2,<2"
semver = ">=3.0.4,<4"

[environments]
default = ["default"]
dev = ["dev"]
docs = { features = ["docs"], solve-group = "docs" }

[tasks]
build-base = "docker context use default && docker compose --project-directory docker --env-file versions.env --progress plain build base"
build-latest = { cmd = "docker compose --project-directory docker --env-file versions.env --progress plain build latest", depends-on = ["build-base"] }
build-next = { cmd = "docker compose --project-directory docker --env-file versions.env --progress plain build next", depends-on = ["build-base"] }
latest = "docker run --rm --name here-be-dragons-latest -p 8080:8080 localhost/here-be-dragons:latest"
next = "docker run --rm --name here-be-dragons-next -p 8080:8080 localhost/here-be-dragons:next"

[feature.docs]
# dependencies should include everything in docs/requirements.txt
dependencies = { "jupyter" = ">=1.1.1,<2", "myst-parser" = ">=5.1.0,<6", "nbsphinx" = ">=0.9.8,<0.10", "notebook" = ">=7.5.6,<8", "pydata-sphinx-theme" = ">=0.17.1,<0.18", "sphinx" = ">=9.1.0,<10", "sphinx-copybutton" = ">=0.5.2,<0.6" }
platforms = ["linux-64"]
tasks = { "docs" = "make -C docs html" }

[feature.dev.dependencies]
geopandas = ">=1.1.3,<2"
lonboard = ">=0.16.0,<0.17"
marimo = ">=0.23.8,<0.24"
pixi-pycharm = ">=0.0.11,<0.0.12"
pytest = ">=9.0.3,<10"
ruff = ">=0.15.15,<0.16"

[feature.dev.tasks]
test = "pytest"
