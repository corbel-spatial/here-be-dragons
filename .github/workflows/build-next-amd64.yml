name: Build Next (amd64)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.67.0
          cache: true

      - name: Run build
        run: |
          pixi run build --amd --push --next --user ${{ github.actor }} --token ${{ secrets.GITHUB_TOKEN }} --parallel 8
