name: Build Next Image
on:
  workflow_dispatch:
  workflow_run:
    workflows: [ Build Base Image ]
    types: [ completed ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: corbel-spatial/here-be-dragons

jobs:
  build-next:
    if: >
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            suffix: "-amd64"
          - arch: arm64
            runner: ubuntu-latest-arm64
            suffix: "-arm64"
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Next
        env:
          ARCH_SUFFIX: ${{ matrix.suffix }}
        run: |
          set -a; source versions.env; set +a
          cd docker
          docker buildx bake --push next

  stitch:
    if: >
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    needs: build-next
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: versions.env
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge Manifests
        run: |
          set -a; source versions.env; set +a
          
          TAGS=(
            "next"
            "experimental"
            "py${NEXT_TAG}"
            "py${NEXT_TAG_SHORT}"
          )
          
          for TAG in "${TAGS[@]}"; do
            echo "Stitching manifest for tag: $TAG"
            docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG} \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}-amd64 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}-arm64
          done
