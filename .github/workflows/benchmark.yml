name: Spatial Performance Benchmark

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to profile'
        required: true
        default: 'latest'
        type: choice
        options: [ latest, next ]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: set-tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            # Safely check files changed in the latest commit without HEAD^ crashing on new branches
            if git diff-tree --no-commit-id --name-only -r HEAD | grep -q "^next/Dockerfile"; then
              echo "tag=next" >> $GITHUB_OUTPUT
            else
              echo "tag=latest" >> $GITHUB_OUTPUT
            fi
          fi

  benchmark:
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/corbel-spatial/here-be-dragons:${{ needs.setup.outputs.tag }}

    steps:
      - name: Cache Datasets
        id: cache-datasets
        uses: actions/cache@v4
        with:
          path: |
            data/nz-buildings.parquet
            data/nz-buildings.gpkg
          key: spatial-datasets-v7

      - name: Prepare Multi-Format Datasets
        if: steps.cache-datasets.outputs.cache-hit != 'true'
        run: |
          mkdir -p data
          curl -L -o data/nz-buildings.gpkg https://data.source.coop/visheratin/new-zealand-building-outlines/nz-building-outlines.gpkg
          ogr2ogr -f Parquet data/nz-buildings.parquet data/nz-buildings.gpkg \
            -lco COMPRESSION=SNAPPY -lco GEOMETRY_ENCODING=WKB

      - name: Run Profile
        env:
          GDAL_NUM_THREADS: ALL_CPUS
          OPENBLAS_NUM_THREADS: 8
          OMP_NUM_THREADS: 8
          PROJ_NETWORK: "OFF"
          CPL_DEBUG: "ON"
        run: |
          python3 << 'EOF'
          import pyogrio, geopandas as gpd, numpy as np
          import time, sysconfig, os, resource, shapely, json, statistics, tracemalloc
          from contextlib import contextmanager

          results = {"tag": "${{ needs.setup.outputs.tag }}", "metrics": {}, "env": {}, "debug": {}}
          
          @contextmanager
          def timer(label, results_dict):
              start = time.perf_counter()
              yield
              results_dict[label] = round(time.perf_counter() - start, 3)

          # 1. SETUP
          tracemalloc.start()
          results["env"] = {
              "gdal": pyogrio.__gdal_version__,
              "geos": shapely.geos_version_string,
              "timestamp": time.time(),
              "geos_threads": getattr(shapely, "get_num_threads", lambda: 8)()
          }

          # 2. BURN-IN & HARDWARE FLUSH
          for _ in range(5): 
              _A = np.random.rand(500, 500)
              _ = np.linalg.eigh(_A @ _A.T) # Mathematically safe symmetric CPU stress
          os.sync()
          time.sleep(2) 

          # 3. BENCHMARK A: IO STRENGTH
          path = "data/nz-buildings.parquet"
          _ = pyogrio.read_info(path) 
          
          with timer("io_std_s", results["metrics"]):
              _ = pyogrio.read_dataframe(path)

          arrow_times = []
          for _ in range(7):
              ts = time.perf_counter()
              _ = pyogrio.read_arrow(path)
              arrow_times.append(time.perf_counter() - ts)
          
          results["metrics"]["io_arrow_median_s"] = round(statistics.median(arrow_times), 3)
          results["metrics"]["io_arrow_stdev"] = round(statistics.stdev(arrow_times), 4)
          results["metrics"]["io_speedup"] = round(results["metrics"]["io_std_s"] / results["metrics"]["io_arrow_median_s"], 2)

          # 4. BENCHMARK B: COMPUTE (8-CORE SPATIAL JOIN)
          # Explicitly use pyogrio to test GDAL bindings, NOT pyarrow native
          buildings = pyogrio.read_dataframe(path).head(200000)
          
          # Dynamically extract real bounding box to avoid zero-result joins
          xmin, ymin, xmax, ymax = buildings.total_bounds
          points = gpd.GeoDataFrame(
              geometry=gpd.points_from_xy(
                  np.random.uniform(xmin, xmax, 1000000), 
                  np.random.uniform(ymin, ymax, 1000000)
              ), 
              crs=buildings.crs
          )
          
          # JIT Warmup
          _ = gpd.sjoin(points.head(20000), buildings, predicate='within', how='inner')

          with timer("join_total_s", results["metrics"]):
              with timer("join_index_build_s", results["debug"]):
                  _idx = buildings.sindex 
              with timer("join_query_s", results["debug"]):
                  _ = gpd.sjoin(points, buildings, predicate='within', how='inner')

          # 5. MEMORY & FINALIZATION
          snapshot = tracemalloc.take_snapshot()
          results["debug"]["top_mem_allocs"] = [str(s) for s in snapshot.statistics('lineno')[:3]]
          results["metrics"]["peak_mem_mb"] = int(resource.getrusage(resource.RUSAGE_SELF).ru_maxrss / 1024)

          with open("results.json", "w") as f:
              json.dump(results, f, indent=2)
          EOF

      - name: Publish Summary
        if: always()
        run: |
          if [ -f results.json ]; then
            TAG=$(jq -r '.tag' results.json)
            echo "### 🐉 Profile Report: $TAG" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Result | Reliability |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo "| **Arrow Speedup** | $(jq -r '.metrics.io_speedup' results.json)x | ±$(jq -r '.metrics.io_arrow_stdev' results.json)s |" >> $GITHUB_STEP_SUMMARY
            echo "| **Join Throughput** | $(python3 -c "print(int(1000000/$(jq -r '.metrics.join_total_s' results.json)))") pts/s | - |" >> $GITHUB_STEP_SUMMARY
            echo -e "\n#### Sub-step Breakdown" >> $GITHUB_STEP_SUMMARY
            echo "* **Index Build:** $(jq -r '.debug.join_index_build_s' results.json)s" >> $GITHUB_STEP_SUMMARY
            echo "* **Spatial Query:** $(jq -r '.debug.join_query_s' results.json)s" >> $GITHUB_STEP_SUMMARY
            echo "* **Peak Memory:** $(jq -r '.metrics.peak_mem_mb' results.json) MB" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: profile-${{ needs.setup.outputs.tag }}-${{ github.run_id }}
          path: results.json
