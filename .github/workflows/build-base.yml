name: Build Base Image
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-base.yml
      - .github/workflows/build-next.yml
      - .github/workflows/build-latest.yml
      - versions.env
      - docker/base.Dockerfile
      - docker/build.Dockerfile
      - docker/docker-compose.yml

env:
  IMAGE_NAME: corbel-spatial/here-be-dragons
  REGISTRY: ghcr.io

jobs:
  build-base:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            suffix: "-amd64"
          - arch: arm64
            runner: ubuntu-latest-arm64
            suffix: "-arm64"
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Load versions
        run: |
          set -a; source versions.env; set +a
          echo "GEOS_VER=$GEOS_VER" >> $GITHUB_ENV
          echo "PROJ_VER=$PROJ_VER" >> $GITHUB_ENV
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: ./docker
          file: ./docker/base.Dockerfile
          push: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-base${{ matrix.suffix }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-base${{ matrix.suffix }},mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:base${{ matrix.suffix }}
          build-args: |
            GEOS_VER=${{ env.GEOS_VER }}
            PROJ_VER=${{ env.PROJ_VER }}
            PARALLEL=8
