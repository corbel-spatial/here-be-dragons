name: Build Latest (amd64)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.67.0
          cache: true

      - uses: actions/cache@v4
        with:
          path: /tmp/buildkit-cache
          key: buildkit-amd64-latest-${{ github.sha }}
          restore-keys: buildkit-amd64-latest-
      - uses: reproducible-containers/buildkit-cache-dance@v3.1.2
        with:
          cache-source: /tmp/buildkit-cache
          cache-map: |
            { "ccache-amd64": "ccache", "uv-cache": "uv" }

      - name: Run build
        run: |
          pixi run build --amd --push --latest --user ${{ github.actor }} --token ${{ secrets.GITHUB_TOKEN }} --parallel 8
